  <!-- Upper latitude arc -->
  <path d="M4.5 7.5 Q12 9 19.5 7.5" stroke="#A8B5C1" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Lower latitude arc -->
